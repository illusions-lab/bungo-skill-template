name: Generate Assets

on:
  push:
    branches: [main]
    paths:
      - 'illusions-skill.yaml'
      - 'sources/**'
      - 'fonts/**'
      - 'generate/templates/**'
      - 'generate/src/**'
      - 'generate/assets/**'
      - 'generate/bin/**'
      - 'generate/package.json'
  workflow_dispatch:
    inputs:
      targets:
        description: 'Asset targets (og, social, print, all)'
        required: false
        default: 'og,social'
        type: string

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: 'generate/.nvmrc'
          cache: 'npm'
          cache-dependency-path: 'generate/package-lock.json'

      - name: Install dependencies
        working-directory: generate
        run: npm ci || npm install

      - name: Validate YAML
        working-directory: generate
        run: node bin/skill-generator.js validate ../illusions-skill.yaml

      - name: Generate assets
        working-directory: generate
        run: node bin/skill-generator.js generate --only=${{ github.event.inputs.targets || 'og,social' }} ../illusions-skill.yaml

      - name: Commit generated images
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add repository-open-graph.png 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(assets): auto-generate OG/social"
            git push
          fi
